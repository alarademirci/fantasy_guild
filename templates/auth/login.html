{% extends "base.html" %}

{% block title %}Log in{% endblock %}
{% block login_active %}active{% endblock %}

{% block content %}
<div class="col-12 col-sm-8 col-md-5 col-lg-4 mx-auto mt-5">
  <h1 class="h4 mb-4">Log in to Dragonlaria Magic Guild</h1>

  <form method="POST" action="{{ url_for('login_post') }}">
    <div class="mb-3">
      <label for="txt_email" class="form-label">Email</label>
      <input type="text" class="form-control" id="txt_email" name="txt_email" required autofocus placeholder="your@email.com">
    </div>
    <div class="mb-3">
      <label for="txt_password" class="form-label">Password</label>
      <input type="password" class="form-control" id="txt_password" name="txt_password" required placeholder="Enter your password">
    </div>
    <button type="submit" class="btn btn-guild-primary w-100">Log in</button>
  </form>

  <p class="mt-3 text-center text-muted small">
    Don't have an account? <a href="{{ url_for('register') }}">Join the guild</a>
  </p>
</div>
{% endblock %}
